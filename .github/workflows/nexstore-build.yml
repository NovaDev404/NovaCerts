name: NexStore Auto Builder

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/NexStore/**'
      - '.github/workflows/nexstore-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (including libminizip)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq wget tar python3 coreutils unzip zip \
            libminizip1 libminizip-dev zlib1g

      - name: Process folders (download, sign, write plist, per-folder cleanup)
        run: |
          set -euo pipefail

          BASE_RAW="https://raw.githubusercontent.com/${{ github.repository }}/main"

          # fetch latest NexStore release info
          RELEASE_JSON=$(curl -s https://api.github.com/repos/NovaDev404/NexStore/releases/latest)
          IPA_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("(?i)\\.ipa$")) | .browser_download_url' | head -n1)
          VERSION_RAW=$(echo "$RELEASE_JSON" | jq -r '.name')
          if [[ "$VERSION_RAW" =~ v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            VERSION="$VERSION_RAW"
          fi

          echo "Using release version: $VERSION"
          echo "IPA URL: $IPA_URL"

          for d in */ ; do
            DIR=${d%/}
            # skip ignored folders
            if [[ "$DIR" == ".github" || "$DIR" == "scripts" ]]; then
              continue
            fi

            echo "Processing directory: $DIR"

            mkdir -p "$DIR/NexStore"

            # locate signing materials in the customer folder so existing IPAs can be validated
            shopt -s nullglob
            P12_FILES=("$DIR"/*.p12 "$DIR"/*.pfx)
            PROV_FILES=("$DIR"/*.mobileprovision)
            PASS_FILES=("$DIR"/password.txt "$DIR"/*.txt)
            shopt -u nullglob

            P12=""
            PROV=""
            PASSFILE=""
            CERT_NAME=""

            if (( ${#P12_FILES[@]} > 0 )); then
              P12=$(realpath "${P12_FILES[0]}")
              CERT_NAME=$(basename "$P12")
              CERT_NAME=${CERT_NAME%.*}
            fi

            if (( ${#PROV_FILES[@]} > 0 )); then
              PROV=$(realpath "${PROV_FILES[0]}")
            fi

            if (( ${#PASS_FILES[@]} > 0 )); then
              PASSFILE=$(realpath "${PASS_FILES[0]}")
            fi

            if [[ -z "$CERT_NAME" ]]; then
              CERT_NAME="$DIR"
            fi

            # only skip if both files already exist and the IPA already has the injected signing assets
            if [[ -f "$DIR/NexStore/NexStore.ipa" && -f "$DIR/NexStore/install.plist" ]]; then
              echo "Existing build detected, validating injected signing assets: $DIR"

              if python3 scripts/check_injected_signing_assets.py "$DIR/NexStore/NexStore.ipa" "$CERT_NAME"
              then
                echo "Already exists with injected signing assets, skipping: $DIR"
                # ensure no leftover zsign artifacts linger in that folder
                rm -f "$DIR/NexStore/zsign" "$DIR/NexStore/zsign.tgz" "$DIR/NexStore/zsign.tgz" "$DIR/NexStore/zsign-linux-*" || true
                rm -rf "$DIR/NexStore/zsign"* || true
                continue
              fi

              if [[ -z "$P12" || -z "$PROV" || -z "$PASSFILE" ]]; then
                echo "Existing IPA is missing injected signing assets for $DIR, but signing files are unavailable, leaving current build untouched"
                rm -f "$DIR/NexStore/zsign" "$DIR/NexStore/zsign.tgz" "$DIR/NexStore/zsign.tgz" "$DIR/NexStore/zsign-linux-*" || true
                rm -rf "$DIR/NexStore/zsign"* || true
                continue
              fi

              echo "Existing IPA is missing injected signing assets, rebuilding: $DIR"
              rm -f "$DIR/NexStore/NexStore.ipa" "$DIR/NexStore/install.plist"
            fi

            cd "$DIR/NexStore"

            echo "Downloading NexStore.ipa..."
            wget -q --show-progress "$IPA_URL" -O NexStore.ipa

            echo "Downloading zsign..."
            wget -q https://github.com/zhlynn/zsign/releases/download/v0.9.1/zsign-linux-x86_64.tar.gz -O zsign.tgz
            tar -xzf zsign.tgz
            chmod +x zsign || true

            # debug linked libs if binary not runnable
            if ! ldd ./zsign >/dev/null 2>&1; then
              echo "ldd for zsign:"
              ldd ./zsign || true
            fi

            if [[ -z "$P12" || -z "$PROV" || -z "$PASSFILE" ]]; then
              echo "Missing signing files (.p12/.pfx, .mobileprovision, password.txt) for $DIR — skipping"
              # per-folder cleanup of zsign artifacts even on skip
              rm -f zsign zsign.tgz zsign-linux-* || true
              rm -rf zsign* || true
              cd ../..
              continue
            fi

            PASSWORD=$(cat "$PASSFILE")

            echo "Signing NexStore.ipa..."
            if ! ./zsign -k "$P12" -m "$PROV" -p "$PASSWORD" -o NexStore-signed.ipa NexStore.ipa ; then
              echo "zsign failed for $DIR"
              ldd ./zsign || true
              # cleanup artifacts for this folder before moving on
              rm -f zsign zsign.tgz zsign-linux-* || true
              rm -rf zsign* || true
              cd ../..
              continue
            fi

            echo "Injecting signing assets into signed IPA..."
            INJECT_DIR=$(mktemp -d)
            if ! unzip -q NexStore-signed.ipa -d "$INJECT_DIR"; then
              echo "Failed to unpack signed IPA for $DIR"
              rm -rf "$INJECT_DIR"
              rm -f zsign zsign.tgz zsign-linux-* || true
              rm -rf zsign* || true
              cd ../..
              continue
            fi

            APP_DIR=$(find "$INJECT_DIR/Payload" -maxdepth 1 -type d -name '*.app' | head -n1)
            if [[ -z "$APP_DIR" ]]; then
              echo "Failed to locate .app bundle inside signed IPA for $DIR"
              rm -rf "$INJECT_DIR"
              rm -f zsign zsign.tgz zsign-linux-* || true
              rm -rf zsign* || true
              cd ../..
              continue
            fi

            ASSET_DIR="$APP_DIR/signing-assets/$CERT_NAME"
            mkdir -p "$ASSET_DIR"
            cp "$P12" "$ASSET_DIR/cert.p12"
            cp "$PROV" "$ASSET_DIR/cert.mobileprovision"
            cp "$PASSFILE" "$ASSET_DIR/cert.txt"

            INJECTED_IPA="NexStore-injected.ipa"
            (
              cd "$INJECT_DIR"
              zip -qry "$OLDPWD/$INJECTED_IPA" Payload
            )

            echo "Re-signing injected IPA so bundle contents stay valid..."
            if ! ./zsign -k "$P12" -m "$PROV" -p "$PASSWORD" -o NexStore-final.ipa "$INJECTED_IPA" ; then
              echo "zsign failed after injecting assets for $DIR"
              ldd ./zsign || true
              rm -rf "$INJECT_DIR"
              rm -f "$INJECTED_IPA" NexStore-signed.ipa
              rm -f zsign zsign.tgz zsign-linux-* || true
              rm -rf zsign* || true
              cd ../..
              continue
            fi

            rm -rf "$INJECT_DIR"
            rm -f "$INJECTED_IPA" NexStore-signed.ipa

            # replace unsigned ipa with the injected and re-signed one
            rm -f NexStore.ipa
            mv NexStore-final.ipa NexStore.ipa

            export IPA_LINK="${BASE_RAW}/${DIR}/NexStore/NexStore.ipa"
            export NS_VERSION="$VERSION"

            echo "Writing install.plist using scripts/write_plist.py..."
            # assumes scripts/write_plist.py is committed in repo root
            python3 ../../scripts/write_plist.py

            # per-folder cleanup: remove zsign and archive
            echo "Cleaning up zsign artifacts in $DIR/NexStore ..."
            rm -f zsign zsign.tgz zsign-linux-* || true
            rm -rf zsign* || true

            cd ../..
          done

      - name: Final cleanup (remove any leftover zsign artifacts anywhere in workspace)
        run: |
          set -euo pipefail
          echo "Final cleanup: removing any zsign/zsign.tgz/zsign-linux-* files or dirs in workspace"
          # remove common archive names and extracted binaries
          find . -type f \( -iname 'zsign' -o -iname 'zsign.tgz' -o -iname 'zsign-linux-*.tar.gz' -o -iname 'zsign-*.tgz' \) -print -exec rm -f {} +
          # remove directories named zsign* just in case
          find . -type d -iname 'zsign*' -print -exec rm -rf {} +
          # also remove any stray extracted files named zsign in deeper folders
          find . -type f -iname 'zsign' -print -exec rm -f {} +

      - name: Commit new files
        uses: EndBug/add-and-commit@v9
        with:
          add: "."
          message: "auto: build NexStore signed ipa"
          default_author: github_actions
